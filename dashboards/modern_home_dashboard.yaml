  - title: Musik
    path: musik
    icon: mdi:music
    cards:
      - type: vertical-stack
        cards:
          - type: custom:sonos-card
            sections:
              - player
            entities:
              - media_player.kuche
              - media_player.wohnzimmer
              - media_player.arbeitszimmer
              - media_player.kinderzimmer
              - media_player.bad
              - media_player.gastebad
              - media_player.schlafzimmer
              - media_player.esszimmer_3
            predefinedGroups:
              - name: Standard
                media: ''
                entities:
                  - player: media_player.kuche
                    volume: 20
                  - player: media_player.wohnzimmer
                    volume: 20
                  - player: media_player.bad
                    volume: 20
                  - player: media_player.gastebad
                    volume: 20
              - name: Party
                media: ''
                entities:
                  - player: media_player.kuche
                    volume: 25
                  - player: media_player.wohnzimmer
                    volume: 25
                  - player: media_player.arbeitszimmer
                    volume: 10
                  - player: media_player.bad
                    volume: 20
                  - player: media_player.gastebad
                    volume: 20
                  - player: media_player.kinderzimmer
                    volume: 15
            showVolumeUpAndDownButtons: true
            heightPercentage: 100
          - type: custom:sonos-card
            sections:
              - media browser
            entities:
              - media_player.wohnzimmer
              - media_player.arbeitszimmer
              - media_player.kinderzimmer
              - media_player.bad
              - media_player.gastebad
              - media_player.schlafzimmer
              - media_player.kuche
              - media_player.esszimmer_3
          - type: custom:sonos-card
            sections:
              - grouping
            entities:
              - media_player.wohnzimmer
              - media_player.arbeitszimmer
              - media_player.kinderzimmer
              - media_player.bad
              - media_player.gastebad
              - media_player.schlafzimmer
              - media_player.kuche
              - media_player.esszimmer_3
            favoritesItemsPerRow: 12
      - type: markdown
        content: |
          {% if is_state('sensor.genius_lyrics_esszimmer_3_lyrics', 'on') %}
          ![image]({{ states.sensor.genius_lyrics_esszimmer_3_lyrics.attributes.media_image }})

