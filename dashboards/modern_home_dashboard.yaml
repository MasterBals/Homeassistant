    icon: mdi:teddy-bear
    type: sections
    max_columns: 4
    sections:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-title-card
            title: Dominiks Toniebox
            grid_options:
              column_span: 2
          - type: picture-entity
            entity: image.dominik_s_tonie_box_content_picture
            name: Aktuelles Hörspiel
            show_state: false
          - type: entities
            title: Wiedergabeinfos
            entities:
              - entity: sensor.dominik_s_tonie_box_content_title
                name: Titel
              - entity: sensor.dominik_s_tonie_box_volume_db
                name: Lautstärke dB
              - entity: sensor.dominik_s_tonie_box_volume_level
                name: Lautstärke Level
              - entity: sensor.dominik_s_tonie_box_tag_valid
                name: Tag UID
              - entity: binary_sensor.dominik_s_tonie_box_charger
                name: Ladestation
          - type: entities
            title: Steuerung
            entities:
              - entity: event.dominik_s_tonie_box_volume_down
                name: Leiser (kleines Ohr)
              - entity: event.dominik_s_tonie_box_volume_up
                name: Lauter (großes Ohr)
              - entity: sensor.dominik_s_tonie_box_content_audio_id
                name: Audio ID
          - type: entities
            title: TeddyCloud Server
            entities:
              - entity: switch.teddycloud_server_cloud_cachecontent_cache_cloud_content_on_local_server
                name: Cloud Inhalte cachen
              - entity: switch.teddycloud_server_cloud_enabled_generally_enable_cloud_operation
                name: Cloud Betrieb aktiv
      - type: grid
        cards:
          - type: markdown
            content: " "
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  min-height: 140px;
                }
      - type: grid
        cards:
          - type: custom:bubble-card
            card_type: horizontal-buttons-stack
            style:
              position: fixed
              bottom: 20px
              left: 50%
              transform: translateX(-50%)
              width: 80%
              padding: 15px
              padding-bottom: 20px
              display: flex
              justify-content: space-around
              background: rgba(0, 0, 0, 0.3)
              border-radius: 15px
              z-index: 1000
            1_link: /smart-home-dashboard/home
            1_name: Home
            1_icon: mdi:home
            2_link: /smart-home-dashboard/wohnbereich
            2_name: Wohnbereich
            2_icon: mdi:sofa
            3_link: /smart-home-dashboard/beleuchtung
            3_name: Beleuchtung
            3_icon: mdi:lightbulb-group
            4_link: /smart-home-dashboard/musik
            4_name: Musik
            4_icon: mdi:music-circle
            5_link: /smart-home-dashboard/kameras
            5_name: Kameras
            5_icon: mdi:cctv
            6_link: /smart-home-dashboard/reinigung
            6_name: Reinigung
            6_icon: mdi:vacuum
            7_link: /smart-home-dashboard/drucker
            7_name: 3D Drucker
            7_icon: mdi:printer-3d
            8_link: /smart-home-dashboard/kalender
            8_name: Kalender
            8_icon: mdi:calendar
            9_link: /smart-home-dashboard/tonies
            9_name: Toniebox
            9_icon: mdi:teddy-bear
            width_desktop: 80%
            margin: 0px
            highlight_current_view: true
            hide_gradient: false
            auto_order: false
            rise_animation: true
