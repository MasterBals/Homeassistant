title: Smart Home Dashboard
theme: ios-dark-mode-blue-red
views:
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    layout:
      grid-template-rows: 1fr
      grid-template-columns: 1fr
      grid-template-areas:
        - content
    cards: []
    sections:
      - type: grid
        cards:
          - show_current: true
            show_forecast: false
            type: weather-forecast
            entity: weather.forecast_home_2
            forecast_type: daily
            grid_options:
              columns: 12
              rows: 2
          - type: horizontal-stack
            cards:
              - type: custom:list-card
                entity: sensor.blicknews
                title: ''
                feed_attribute: entries
                row_limit: 3
                sort_by: published
                sort_desc: true
                style:
                  width: 50%
                  max-width: 50%
                  align-self: center
                card_mod:
                  style: |
                    ha-card {
                      background: transparent !important;
                      box-shadow: none !important;
                    }
                    table {
                      background: transparent !important;
                    }
                    tbody {
                      background: transparent !important;
                    }
                    tr {
                      background: transparent !important;
                    }
                    td {
                      background: transparent !important;
                    }
                columns:
                  - title: ''
                    field: image
                    type: image
                    add_link: link
                    width: 177
                    height: 100
                  - title: ''
                    field: title
                    style:
                      - white-space: normal
                      - font-size: 15px
                      - padding: 15px
                      - text-align: left
            grid_options:
              columns: 18
              rows: auto
      - type: grid
        cards:
          - type: horizontal-stack
            cards:
              - type: todo-list
                entity: todo.familie_balsiger
                theme: ios-dark-mode-dark-blue-alternative
                title: Aufgaben
                filter: active
                card_mod:
                  style: |
                    ha-card {
                      max-height: 600px;
                      overflow-y: scroll;
                      scrollbar-width: none;
                    }
                    ha-card::-webkit-scrollbar {
                      display: none;
                    }
              - type: todo-list
                entity: todo.zuhause
                theme: ios-dark-mode-dark-blue-alternative
                title: Einkaufen
                filter: active
                card_mod:
                  style: |
                    ha-card {
                      max-height: 600px;
                      overflow-y: scroll;
                      scrollbar-width: none;
                    }
                    ha-card::-webkit-scrollbar {
                      display: none;
                    }
      - type: grid
        cards:
          - type: grid
            square: false
            columns: 3
            title: Schnellzugriff Szenen
            cards:
              - type: button
                name: Heimkommen
                icon: mdi:home-heart
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  data:
                    entity_id: scene.heimkommen_mit_musik
              - type: button
                name: Gute Nacht
                icon: mdi:weather-night
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  data:
                    entity_id: scene.gute_nacht
              - type: button
                name: Party
                icon: mdi:party-popper
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  data:
                    entity_id: scene.party_modus
          - type: grid
            square: false
            columns: 2
            title: Aktive Medien
            cards:
              - type: media-control
                entity: media_player.spotify_dominik_balsiger
              - type: media-control
                entity: media_player.wohnzimmer
      - type: grid
        cards:
          - type: markdown
            content: |
              {% if is_state('media_player.spotify_dominik_balsiger', 'playing') %}
              **Spotify** · {{ state_attr('media_player.spotify_dominik_balsiger', 'media_title') }} — {{ state_attr('media_player.spotify_dominik_balsiger', 'media_artist') }}
              {% else %}
              **Spotify** ist bereit für deine nächste Session.
              {% endif %}

              {% if is_state('media_player.wohnzimmer', 'playing') %}
              **Wohnzimmer** · {{ state_attr('media_player.wohnzimmer', 'media_title') }}{% if state_attr('media_player.wohnzimmer', 'media_artist') %} — {{ state_attr('media_player.wohnzimmer', 'media_artist') }}{% endif %}
              {% else %}
              **Wohnzimmer Lautsprecher** warten auf eine Auswahl.
              {% endif %}
      - type: grid
        cards:
          - type: markdown
            content: " "
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  min-height: 140px;
                }
      - type: grid
        cards:
          - type: grid
            columns: 8
            square: false
            card_mod:
              style: |
                :host {
                  position: fixed;
                  left: 50%;
                  bottom: 24px;
                  transform: translateX(-50%);
                  width: min(80vw, 2048px);
                  z-index: 1000;
                }
                ha-card {
                  width: 100%;
                  margin: 0 auto;
                  border-radius: 20px;
                  backdrop-filter: blur(8px);
                  background: rgba(20, 24, 32, 0.75);
                  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
                  padding: 12px 8px 4px;
                }
            cards:
              - type: button
                name: Home
                icon: mdi:home
                tap_action:
                  action: navigate
                  navigation_path: home
              - type: button
                name: Wohnbereich
                icon: mdi:sofa
                tap_action:
                  action: navigate
                  navigation_path: wohnbereich
              - type: button
                name: Licht
                icon: mdi:lightbulb-group
                tap_action:
                  action: navigate
                  navigation_path: licht
              - type: button
                name: Musik
                icon: mdi:music-circle
                tap_action:
                  action: navigate
                  navigation_path: musik
              - type: button
                name: Kameras
                icon: mdi:cctv
                tap_action:
                  action: navigate
                  navigation_path: kameras
              - type: button
                name: Reinigung
                icon: mdi:vacuum
                tap_action:
                  action: navigate
                  navigation_path: reinigung
              - type: button
                name: 3D Drucker
                icon: mdi:printer-3d
                tap_action:
                  action: navigate
                  navigation_path: drucker
              - type: button
                name: Kalender
                icon: mdi:calendar
                tap_action:
                  action: navigate
                  navigation_path: kalender

