  - title: Musik
    path: musik
    icon: mdi:music-circle
    cards:
      - type: vertical-stack
        cards:
          - type: grid
            title: Multiroom Controller
            columns: 2
            square: false
            cards:
              - type: media-control
                entity: media_player.spotify_dominik_balsiger
              - type: media-control
                entity: media_player.wohnzimmer
              - type: media-control
                entity: media_player.esszimmer_3
              - type: media-control
                entity: media_player.kuche
              - type: media-control
                entity: media_player.kinderzimmer
              - type: media-control
                entity: media_player.tv_wohnzimmer
          - type: markdown
            title: Playlist & Stimmung
            content: |
              {% set players = [
                  'media_player.spotify_dominik_balsiger',
                  'media_player.wohnzimmer',
                  'media_player.esszimmer_3',
                  'media_player.kuche',
                  'media_player.kinderzimmer',
                  'media_player.tv_wohnzimmer'
                ] %}
          {% for player in players %}
          {% set name = state_attr(player, 'friendly_name') or player.split('.')[-1]|replace('_', ' ')|title %}
          {% if is_state(player, 'playing') %}
          • **{{ name }}** spielt **{{ state_attr(player, 'media_title') }}**{% if state_attr(player, 'media_artist') %} – {{ state_attr(player, 'media_artist') }}{% endif %}
          {% elif is_state(player, 'paused') %}
          • **{{ name }}** ist pausiert ({{ state_attr(player, 'media_title') or 'keine Auswahl' }})
          {% else %}
          • **{{ name }}** wartet auf eine Playlist.
          {% endif %}
          {% endfor %}
