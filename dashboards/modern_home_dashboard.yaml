title: Smart Home Dashboard
theme: ios-dark-mode-blue-red
views:
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 4
    sections:
      - type: grid
        columns: 4
        square: false
        cards:
          - type: vertical-stack
            cards:
              - type: custom:mushroom-title-card
                title: Schnellaktionen
              - type: grid
                columns: 1
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    primary: Heimkommen
                    secondary: Szene aktivieren
                    icon: mdi:home-plus
                    icon_color: teal
                    layout: vertical
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.heimkommen_mit_musik
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: custom:mushroom-template-card
                    primary: Gute Nacht
                    secondary: Szene aktivieren
                    icon: mdi:weather-night
                    icon_color: indigo
                    layout: vertical
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.gehen
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: custom:mushroom-template-card
                    primary: Reinigung starten
                    secondary: Dreame Saugroboter
                    icon: mdi:robot-vacuum
                    icon_color: amber
                    layout: vertical
                    tap_action:
                      action: call-service
                      service: script.start_vacuum_cleaning
                    hold_action:
                      action: more-info
                      entity: vacuum.dreame
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: custom:mushroom-template-card
                    primary: Multiroom Musik
                    secondary: Lieblingsgruppe
                    icon: mdi:speaker-multiple
                    icon_color: deep-purple
                    layout: vertical
                    tap_action:
                      action: call-service
                      service: script.group_and_play_sonos
                    hold_action:
                      action: more-info
                      entity: media_player.wohnzimmer
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
          - type: vertical-stack
            grid_options:
              column_span: 2
            cards:
              - type: custom:mushroom-title-card
                title: Klima & Tagesüberblick
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.time') }}"
                secondary: "{{ now().strftime('%A, %d.%m.%Y') }}"
                icon: mdi:clock-digital
                icon_color: cyan
                layout: vertical
                fill_container: true
                card_mod:
                  style: |
                    ha-card {
                      border-radius: 24px;
                      padding: 24px;
                      font-size: 48px;
                    }
                    mushroom-shape-icon {
                      --icon-size: 64px;
                    }
              - type: weather-forecast
                entity: weather.forecast_home_2
                show_forecast: true
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    primary: Innen {{ states('sensor.sensor_wohnzimmer_temperature') | round(1, default=0) }}°C
                    secondary: Wohnzimmer Temperatur
                    icon: mdi:sofa
                    icon_color: light-blue
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: custom:mushroom-template-card
                    primary: Außen {{ states('sensor.aarlo_temperature_katzentor') | round(1, default=0) }}°C
                    secondary: Katzentor Sensor
                    icon: mdi:tree
                    icon_color: green
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: sensor
                    entity: sensor.sensor_wohnzimmer_temperature
                    graph: line
                    detail: 1
                    name: Wohnzimmer Verlauf
                  - type: sensor
                    entity: sensor.aarlo_humidity_kinderzimmer
                    graph: line
                    detail: 1
                    name: Luftfeuchtigkeit Kinderzimmer
          - type: vertical-stack
            cards:
              - type: custom:mushroom-title-card
                title: Haushaltsstatus
              - type: grid
                columns: 1
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    primary: "Dreame Akku {{ states('sensor.dreame_battery_level') }}%"
                    secondary: "{{ states('sensor.dreame_status') }}"
                    icon: mdi:battery-high
                    icon_color: lime
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: custom:mushroom-template-card
                    primary: 3D Drucker {{ states('sensor.creality_k2_plus_printer_state') }}
                    secondary: "Fortschritt {{ states('sensor.creality_k2_plus_progress') }}%"
                    icon: mdi:printer-3d
                    icon_color: orange
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: custom:mushroom-template-card
                    primary: "Terra Pad Akku {{ states('sensor.terra_pad_1201_battery_level') }}%"
                    secondary: "{{ states('sensor.terra_pad_1201_battery_state') }}"
                    icon: mdi:tablet
                    icon_color: blue
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
                  - type: custom:mushroom-template-card
                    primary: Eingang Bewegung
                    secondary: "{{ states('sensor.sensor_eingang_battery') }}% Batteriespannung"
                    icon: mdi:motion-sensor
                    icon_color: yellow
                    card_mod:
                      style: |
                        ha-card {
                          border-radius: 18px;
                          padding: 18px;
                        }
      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:mushroom-title-card
            title: Licht & Komfort
            grid_options:
              column_span: 4
          - type: custom:mushroom-light-card
            entity: light.wohnzimmer
            name: Wohnzimmer
            icon: mdi:sofa
            use_light_color: true
            show_brightness_control: true
          - type: custom:mushroom-light-card
            entity: light.esszimmer
            name: Esszimmer
            icon: mdi:silverware-fork-knife
            use_light_color: true
            show_brightness_control: true
          - type: custom:mushroom-light-card
            entity: light.kuche
            name: Küche
            icon: mdi:stove
            use_light_color: true
            show_brightness_control: true
          - type: custom:mushroom-light-card
            entity: light.schlafzimmer
            name: Schlafzimmer
            icon: mdi:bed-king
            use_light_color: true
            show_brightness_control: true
          - type: custom:mushroom-media-player-card
            entity: media_player.spotify_dominik_balsiger
            name: Spotify
            use_media_info: true
            fill_container: true
            media_controls:
              - play_pause
              - next
              - previous
            volume_controls:
              - volume_set
            grid_options:
              column_span: 2
          - type: custom:mushroom-media-player-card
            entity: media_player.wohnzimmer
            name: Wohnzimmer Lautsprecher
            use_media_info: true
            volume_controls:
              - volume_set
            media_controls:
              - play_pause
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Staubsauger {{ states('vacuum.dreame') }}
            secondary: "Fläche {{ states('sensor.dreame_cleaned_area') }} m² · Dauer {{ states('sensor.dreame_cleaning_time') }} min"
            icon: mdi:robot-vacuum
            icon_color: amber
            tap_action:
              action: more-info
              entity: vacuum.dreame
            card_mod:
              style: |
                ha-card {
                  border-radius: 18px;
                  padding: 18px;
                }
          - type: custom:mushroom-template-card
            primary: Shield TV
            secondary: "{{ states('media_player.shield_2') }}"
            icon: mdi:television
            icon_color: purple
            tap_action:
              action: more-info
              entity: media_player.shield_2
            card_mod:
              style: |
                ha-card {
                  border-radius: 18px;
                  padding: 18px;
                }
          - type: entities
            title: Bewegungsmelder
            show_header_toggle: false
            entities:
              - entity: automation.sensor_light
                name: Büro
              - entity: automation.sensor_licht_wohnzimmer
                name: Wohnzimmer
              - entity: automation.kinderzimmer
                name: Kinderzimmer
              - entity: automation.sensor_licht_korridor
                name: Korridor
            state_color: true
            grid_options:
              column_span: 2
      - type: grid
        cards:
          - type: markdown
            content: " "
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  min-height: 140px;
                }
      - type: grid
        cards:
          - type: custom:bubble-card
            card_type: horizontal-buttons-stack
            style:
              position: fixed
              bottom: 20px
              left: 50%
              transform: translateX(-50%)
              width: 80%
              padding: 15px
              padding-bottom: 20px
              display: flex
              justify-content: space-around
              background: rgba(0, 0, 0, 0.3)
              border-radius: 15px
              z-index: 1000
            1_link: /smart-home-dashboard/home
            1_name: Home
            1_icon: mdi:home
            2_link: /smart-home-dashboard/wohnbereich
            2_name: Wohnbereich
            2_icon: mdi:sofa
            3_link: /smart-home-dashboard/beleuchtung
            3_name: Beleuchtung
            3_icon: mdi:lightbulb-group
            4_link: /smart-home-dashboard/musik
            4_name: Musik
            4_icon: mdi:music-circle
            5_link: /smart-home-dashboard/kameras
            5_name: Kameras
            5_icon: mdi:cctv
            6_link: /smart-home-dashboard/reinigung
            6_name: Reinigung
            6_icon: mdi:vacuum
            7_link: /smart-home-dashboard/drucker
            7_name: 3D Drucker
            7_icon: mdi:printer-3d
            8_link: /smart-home-dashboard/kalender
            8_name: Kalender
            8_icon: mdi:calendar
            9_link: /smart-home-dashboard/tonies
            9_name: Toniebox
            9_icon: mdi:teddy-bear
            width_desktop: 80%
            margin: 0px
            highlight_current_view: true
            hide_gradient: false
            auto_order: false
            rise_animation: true

