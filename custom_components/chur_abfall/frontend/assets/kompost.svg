      @keyframes leafB{0%{transform:translate(9px,-36px) rotate(21deg);opacity:0}20%,70%{opacity:1}82%,100%{transform:translate(-6px,16px) rotate(-6deg);opacity:0}}
      @keyframes core{0%{transform:translate(0,-30px);opacity:0}20%,70%{opacity:1}82%,100%{transform:translate(0,12px);opacity:0}}
