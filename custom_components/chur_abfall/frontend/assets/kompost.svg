  <g class="leaf-b"><ellipse cx="162" cy="53" rx="16" ry="31" fill="#65b83c" transform="rotate(28 162 53)"/><path d="M151 39l22 28" stroke="#2f6b2f" stroke-width="4" stroke-linecap="round" opacity=".55"/></g>
