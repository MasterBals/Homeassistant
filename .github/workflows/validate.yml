name: Validate
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install ruff black homeassistant
      - run: ruff check custom_components tests
      - run: black --check custom_components tests
      - run: python -m compileall custom_components
